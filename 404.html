  <title>404 | Global Cyber Talent</title>
  <meta name="description" content="The page you are looking for could not be found." />

  <style>
    :root {
      --blue: #1A6CF8;
      --blue-dark: #0F4EC4;
      --blue-light: #4B8FFF;
      --white: #ffffff;
      --text: #f4f7ff;
      --muted: #aab8d1;
      --panel: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.16);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(74, 143, 255, 0.25), transparent 28%),
        linear-gradient(135deg, #06111f 0%, #0c1830 55%, #10213f 100%);
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 24px;
    }

    body::before,
    body::after {
      content: '';
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.45;
      z-index: 0;
      pointer-events: none;
    }

    body::before {
      background: rgba(26, 108, 248, 0.35);
      top: -90px;
      right: -80px;
      animation: drift 10s ease-in-out infinite alternate;
    }

    body::after {
      background: rgba(75, 143, 255, 0.25);
      bottom: -80px;
      left: -120px;
      animation: drift 12s ease-in-out infinite alternate-reverse;
    }

    .page-shell {
      position: relative;
      z-index: 1;
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      align-items: center;
      gap: 40px;
      background: rgba(7, 16, 30, 0.58);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(18px);
      padding: 36px;
    }

    .content { max-width: 520px; }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(26, 108, 248, 0.16);
      border: 1px solid rgba(26, 108, 248, 0.28);
      color: #8ec4ff;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 4vw, 3.25rem);
      line-height: 1.08;
      margin: 0 0 14px;
      color: var(--white);
    }

    p {
      font-size: 1.04rem;
      line-height: 1.7;
      color: var(--muted);
      margin: 0 0 24px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--blue), var(--blue-light));
      color: var(--white);
      padding: 13px 24px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease;
      box-shadow: 0 10px 24px rgba(26, 108, 248, 0.28);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(26, 108, 248, 0.34);
    }

    .illustration {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 4.5s ease-in-out infinite;
    }

    .illustration svg {
      width: min(100%, 420px);
      height: auto;
      filter: drop-shadow(0 16px 34px rgba(0, 0, 0, 0.24));
    }

    .illustration .stroke {
      stroke-dasharray: 900;
      stroke-dashoffset: 900;
      animation: draw 2.2s ease forwards;
    }

    .illustration .glow {
      animation: pulse 2.4s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.95); opacity: 0.75; }
      50% { transform: scale(1.04); opacity: 1; }
    }

    @keyframes drift {
      from { transform: translate(0, 0); }
      to { transform: translate(24px, 40px); }
    }

    @media (max-width: 820px) {
      .page-shell {
        grid-template-columns: 1fr;
        text-align: center;
        padding: 28px 22px;
      }

      .content {
        max-width: none;
      }

      .btn-primary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="content">
      <span class="badge">404 Error</span>
      <h1>Oops! Page not found</h1>
      <p>The page you’re looking for may have moved, been removed, or never existed. Let’s bring you back to the Global Cyber Talent homepage.</p>
      <a href="index.html" class="btn-primary">Back to Homepage</a>
    </section>

    <section class="illustration" aria-label="Animated 404 illustration">
      <svg viewBox="0 0 500 400" role="img" aria-hidden="true">
        <circle class="glow" cx="250" cy="200" r="118" fill="rgba(26,108,248,0.16)" />

        <path class="stroke" d="M250 118c45 0 82 37 82 82 0 45-37 82-82 82-45 0-82-37-82-82 0-45 37-82 82-82Z" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.85" />
        <path class="stroke" d="M250 144v112" stroke="#ffffff" stroke-width="10" stroke-linecap="round" />
        <path class="stroke" d="M194 200h112" stroke="#ffffff" stroke-width="10" stroke-linecap="round" />
        <path class="stroke" d="M188 98l-44 44" stroke="#4B8FFF" stroke-width="10" stroke-linecap="round" />
        <path class="stroke" d="M312 98l44 44" stroke="#4B8FFF" stroke-width="10" stroke-linecap="round" />
        <path class="stroke" d="M188 302l-44-44" stroke="#4B8FFF" stroke-width="10" stroke-linecap="round" />

        <circle cx="250" cy="200" r="20" fill="#1A6CF8" />
      </svg>
    </section>
  </main>
</body>
</html>
